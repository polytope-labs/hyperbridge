name: Build Runtime

on:
  pull_request:
    paths:
      - ".github/workflows/build-runtime.yml"
  push:
    tags:
      - "nexus-v[0-9]*"
      - "gargantua-v[0-9]*"
  workflow_dispatch:
    inputs:
      runtime:
        description: "Runtime to build"
        required: true
        type: choice
        options:
          - nexus-runtime
          - gargantua-runtime
      ref:
        description: "Git tag to build from (e.g. nexus-v6500)"
        required: true
        type: string

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  determine-runtime:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.runtime.outputs.package }}
      name: ${{ steps.runtime.outputs.name }}
      path: ${{ steps.runtime.outputs.path }}
    steps:
      - id: runtime
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGE="${{ inputs.runtime }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # Default to nexus-runtime for PR testing
            PACKAGE="nexus-runtime"
          else
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == nexus-* ]]; then
              PACKAGE="nexus-runtime"
            elif [[ "$TAG" == gargantua-* ]]; then
              PACKAGE="gargantua-runtime"
            fi
          fi

          NAME="${PACKAGE%-runtime}"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "path=parachain/runtimes/${NAME}" >> "$GITHUB_OUTPUT"

  build-runtime:
    needs: [determine-runtime]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive

      - name: Build ${{ needs.determine-runtime.outputs.name }} runtime with srtool
        id: srtool_build
        uses: paritytech/srtool-actions@v0.9.4
        env:
          BUILD_OPTS: "--features=metadata-hash"
        with:
          chain: ${{ needs.determine-runtime.outputs.name }}
          package: ${{ needs.determine-runtime.outputs.package }}
          runtime_dir: ${{ needs.determine-runtime.outputs.path }}

      - name: Store srtool digest
        run: |
          echo '${{ steps.srtool_build.outputs.json }}' | jq > ${{ needs.determine-runtime.outputs.name }}_srtool_output.json

      - name: Generate keccak256 code hash
        id: hash
        run: |
          WASM_PATH="${{ steps.srtool_build.outputs.wasm_compressed }}"

          pip3 install pycryptodome

          KECCAK256=$(python3 -c "
          from Crypto.Hash import keccak
          with open('${WASM_PATH}', 'rb') as f:
              data = f.read()
          k = keccak.new(digest_bits=256)
          k.update(data)
          print('0x' + k.hexdigest())
          ")

          echo "keccak256=${KECCAK256}" >> "$GITHUB_OUTPUT"
          echo "wasm_path=${WASM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.determine-runtime.outputs.package }}-wasm
          path: ${{ steps.hash.outputs.wasm_path }}

      - name: Upload srtool json
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.determine-runtime.outputs.name }}-srtool-json
          path: ${{ needs.determine-runtime.outputs.name }}_srtool_output.json

  publish-release:
    if: github.event_name != 'pull_request'
    needs: [determine-runtime, build-runtime]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ inputs.ref || github.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release notes
        id: notes
        env:
          NAME: ${{ needs.determine-runtime.outputs.name }}
          PACKAGE: ${{ needs.determine-runtime.outputs.package }}
        run: |
          JSON="${NAME}-srtool-json/${NAME}_srtool_output.json"
          WASM=$(find ${PACKAGE}-wasm -name '*.compact.compressed.wasm')

          SRTOOL() { <${JSON} jq -r ".$1"; }
          SUBWASM() { <${JSON} jq -r ".runtimes.compressed.subwasm.$1"; }

          SPEC_VERSION=$(SUBWASM 'core_version.specVersion')
          SPEC_NAME=$(SUBWASM 'core_version.specName')
          IMPL_NAME=$(SUBWASM 'core_version.implName')
          IMPL_VERSION=$(SUBWASM 'core_version.implVersion')
          TX_VERSION=$(SUBWASM 'core_version.transactionVersion')
          AUTH_VERSION=$(SUBWASM 'core_version.authoringVersion')
          BLAKE2_256=$(SUBWASM 'blake2_256')
          IPFS=$(SUBWASM 'ipfs_hash')
          SIZE=$(SUBWASM 'size')
          COMPRESSED=$(SUBWASM 'compression | if .compressed then "Yes: \(1 - .size_compressed / .size_decompressed | . * 10000 | round / 100)%" else "No" end')
          META_VERSION=$(SUBWASM 'metadata_version')
          RUSTC=$(SRTOOL 'rustc')
          SRTOOL_VERSION=$(SRTOOL 'gen')

          pip3 install pycryptodome

          KECCAK256=$(python3 -c "
          from Crypto.Hash import keccak
          with open('${WASM}', 'rb') as f:
              data = f.read()
          k = keccak.new(digest_bits=256)
          k.update(data)
          print('0x' + k.hexdigest())
          ")

          ASSET_NAME="${NAME}_runtime-v${SPEC_VERSION}.compact.compressed.wasm"
          cp "${WASM}" "${ASSET_NAME}"

          cat > RELEASE_NOTES.md <<-EOF
          # Runtime info
          *This runtime was built with **${RUSTC}** using **[${SRTOOL_VERSION}](https://github.com/paritytech/srtool)***

          To replicate the build, use the following command:
          \`\`\`sh
          srtool build \\
                 --root --profile production \\
                 --package ${PACKAGE} --runtime-dir parachain/runtimes/${NAME} \\
                 --build-opts="--features=metadata-hash"
          \`\`\`

          ## ${SPEC_NAME}
          ~~~
          Runtime Size:           $(numfmt --to iec-i --format "%.2f" ${SIZE}) (${SIZE} bytes)
          Compressed:             ${COMPRESSED}
          Core Version:           ${SPEC_NAME}-${SPEC_VERSION} ${IMPL_NAME}-${IMPL_VERSION}.tx${TX_VERSION}.au${AUTH_VERSION}
          Metadata version:       V${META_VERSION}
          Blake2-256 hash:        ${BLAKE2_256}
          Keccak-256 hash:        ${KECCAK256}
          IPFS:                   ${IPFS}
          ~~~

          ## Usage

          Use the **Keccak-256 hash** for \`system.authorizeUpgrade(codeHash)\`, then upload the WASM artifact via \`system.enactAuthorizedUpgrade(code)\`.
          EOF

          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "spec_version=${SPEC_VERSION}" >> "$GITHUB_OUTPUT"

          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.ref || github.ref_name }}
          name: "${{ needs.determine-runtime.outputs.name }} runtime v${{ steps.notes.outputs.spec_version }}"
          bodyFile: RELEASE_NOTES.md
          artifacts: "${{ steps.notes.outputs.asset_name }}"
          draft: false
          prerelease: false
