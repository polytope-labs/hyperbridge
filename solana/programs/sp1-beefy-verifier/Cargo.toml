[package]
name = "sp1-beefy-verifier"
version = "0.1.0"
edition = "2021"
authors = ["Polytope Labs <hello@polytope.technology>"]
description = "On-chain Solana verifier for SP1 v6 Groth16 proofs of Hyperbridge BEEFY consensus."
publish = false

[lib]
crate-type = ["cdylib", "lib"]

[features]
default = []
# Include the standalone Solana program entrypoint. Off by default — the
# verifier is meant to be linked as a library by host programs. Enable this
# only when building the verifier as a stand-alone deployable program (e.g.
# for the on-chain CU/tx-size example).
entrypoint = []

[dependencies]
solana-program.workspace = true
parity-scale-codec.workspace = true
sha2.workspace = true
hex.workspace = true
groth16-solana.workspace = true
num-bigint.workspace = true
ark-bn254.workspace = true
ark-ff.workspace = true
ark-serialize.workspace = true

[dev-dependencies]
alloy-sol-types.workspace = true
alloy-primitives.workspace = true
sha3.workspace = true
solana-sdk.workspace = true
solana-client = "=2.1.6"
solana-transaction-status = "=2.1.6"
bincode = "1.3"
