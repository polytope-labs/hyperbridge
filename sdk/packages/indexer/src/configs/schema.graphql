	"""
	lastUpdatedAt: BigInt!
}

"""
A phantom order autonomously generated by the intents-coprocessor pallet on Hyperbridge.
Phantom orders are synthetic benchmark orders that the pallet creates at the start of each
interval (governed by PhantomBidWindow) to solicit bids from fillers and measure real
market liquidity and pricing for a given token pair on a destination chain.
The commitment is keccak256(abi.encode(Order)) and serves as the unique identifier.
"""
type PhantomOrder @entity {
	"""
	The phantom order commitment — keccak256(abi.encode(Order)). Primary key and lookup handle
	used when querying bids via intents_getBidsForOrder.
	"""
	id: ID!

	"""
	Destination chain state machine ID (e.g. EVM-8453) where the phantom order seeks liquidity.
	"""
	chain: String! @index

	"""
	EVM address of the input token (tokenA) offered by the phantom order, as a 0x-prefixed hex string.
	"""
	tokenA: String! @index

	"""
	EVM address of the output token (tokenB) requested by the phantom order, as a 0x-prefixed hex string.
	"""
	tokenB: String! @index

	"""
	Standard input amount in the smallest unit of tokenA used as the benchmark quantity for price discovery.
	"""
	standardAmount: BigInt!

	"""
	Hyperbridge block number at which this phantom order was registered (emitted via PhantomOrderRegistered).
	All phantom orders sharing the same createdAtBlock belong to the same generation interval.
	"""
	createdAtBlock: BigInt! @index

	"""
	Timestamp of the Hyperbridge block at which this phantom order was registered.
	"""
	blockTimestamp: Date @index
}

"""
The price snapshot for a phantom order, written once its bid window closes (signalled by the
PhantomBidWindowExhausted event). It collects all live bids via intents_getBidsForOrder, simulates
each filler's user operation against the real IntentGatewayV2 code with the phantom escrow injected
via state override, and records the output amount distribution across the bids that pass simulation.
A snapshot is only written when at least one valid bid exists and an EVM RPC endpoint is configured
for the phantom order's destination chain.
"""
type PhantomOrderPriceSnapshot @entity {
	"""
	Composite identifier: {commitment}-{blockNumber}.
	"""
	id: ID!

	"""
	The phantom order commitment this snapshot belongs to. References PhantomOrder.id.
	"""
	commitment: String! @index

	"""
	EVM address of the input token (tokenA) priced by this snapshot, as a 0x-prefixed hex string.
	"""
	tokenA: String! @index

	"""
	EVM address of the output token (tokenB) the prices are denominated in, as a 0x-prefixed hex string.
	"""
	tokenB: String! @index

	"""
	Standard input amount (smallest unit of tokenA) the prices are quoted against. Denormalized from
	PhantomOrder so the exchange rate (medianPrice / standardAmount, adjusted for token decimals) is
	computable from a single snapshot row without joining back to the order.
	"""
	standardAmount: BigInt!

	"""
	Hyperbridge block number at which this snapshot was taken.
	"""
	blockNumber: BigInt! @index

	"""
	Liquidity-weighted median output amount across all valid bids, in the smallest unit of the
	output token (tokenB). Each bid is weighted by the solver's total balance for that token
	(native + ERC-4626 vault venues), so solvers that can actually deliver size influence the
	median more than those quoting on thin liquidity. Null if no valid bids were found.
	"""
	medianPrice: BigInt @index

	"""
	Lowest output amount across all valid bids, the least the user would receive (most favorable for the solver).
	Null if no valid bids were found.
	"""
	lowestPrice: BigInt @index

	"""
	Highest output amount across all valid bids, the most the user would receive (most favorable for the user).
	Null if no valid bids were found.
	"""
	highestPrice: BigInt @index

	"""
	Number of valid bids that contributed to this snapshot (passed simulation).
	"""
	bidCount: Int!

	"""
	Timestamp of the Hyperbridge block at which this snapshot was taken.
	"""
	snapshotTime: Date!
}

"""
A liquidity provider (solver) that bids on phantom orders. Groups all of its measured liquidity
balances so they can be read as a nested array off a single solver address.
"""
type LiquidityProvider @entity {
	"""
	EVM address of the solver / liquidity provider.
	"""
	id: ID!

	"""
	Every per-chain, per-token liquidity balance measured for this provider across phantom order price
	snapshots.
	"""
	balances: [LiquidityProviderBalance] @derivedFrom(field: "provider")
}

"""
Per-provider, per-chain, per-token liquidity balance recorded at a phantom order price snapshot.
For every valid bidder, the provider's liquidity is swept across every configured yield-vault token
on every supported chain — so one entity is written per (provider, chain, token) the provider
actually holds (zero balances are skipped). Each balance is a single token measured as raw ERC-20
plus redeemable ERC-4626 vault positions; balances of different tokens are never combined into one
value.
"""
type LiquidityProviderBalance @entity {
	"""
	Composite identifier: {chain}-{tokenAddress}-{commitment}-{blockNumber}-{providerAddress}. One row
	per provider per (chain, token) per snapshot, so liquidity is a time series (keyed to the snapshot
	whose weighted median it fed) rather than a single overwritten latest value. For a provider's
	current liquidity, take the row with the greatest blockNumber for that (provider, chain, tokenAddress).
	"""
	id: ID!

	"""
	The liquidity provider (solver) this balance belongs to.
	"""
	provider: LiquidityProvider!

	"""
	State machine ID of the chain (e.g. EVM-8453) where this balance was measured.
	"""
	chain: String! @index

	"""
	The phantom order commitment this balance belongs to.
	"""
	commitment: String! @index

	"""
	Hyperbridge block number at which this balance was recorded.
	"""
	blockNumber: BigInt! @index

	"""
	EVM address of the configured token this balance is measured in.
	"""
	tokenAddress: String! @index

	"""
	Provider balance for tokenAddress on `chain`,
	including raw ERC-20 balance and redeemable ERC-4626 vault positions.
	"""
	balance: BigInt!

	"""
	Timestamp of the Hyperbridge block at which this balance was recorded.
	"""
	snapshotTime: Date!
}
