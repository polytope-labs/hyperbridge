[package]
name = "pallet-state-coprocessor"
version = "0.1.0"
edition = "2021"
description = "The state coprocessor enables Hyperbridge to perform storage queries of connected chains"
authors = ["Polytope Labs <hello@polytope.technology>"]
publish = false

[dependencies]
scale-info = { workspace = true }
codec = { workspace = true }
log = { workspace = true }

# polytope labs
ismp = { workspace = true }
pallet-ismp = { workspace = true }
mmr-primitives = { workspace = true }
pallet-bandwidth = { workspace = true }
pallet-messaging-incentives = { workspace = true }

[dependencies.polkadot-sdk]
workspace = true
features = [
    "frame-support",
    "frame-system",
    "sp-runtime",
    "sp-core",
    "sp-std",
    "sp-io",
]

[features]
default = ["std"]
std = [
    "codec/std",
    "log/std",
    "polkadot-sdk/std",
    "scale-info/std",
    "ismp/std",
    "pallet-ismp/std",
    "mmr-primitives/std",
    "pallet-bandwidth/std",
    "pallet-messaging-incentives/std",
]
try-runtime = ["polkadot-sdk/try-runtime"]
