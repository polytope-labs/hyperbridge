"""
Represents an order placed through the IntentGatewayV3 contract.
This entity tracks cross-chain orders for V3 of the IntentGateway.
"""
type IOrderV3 @entity {
	"""
	Unique identifier for the order (commitment)
	"""
	id: ID!

	"""
	Address of the user who placed the order
	"""
	user: String!

	"""
	Source chain identifier where the order originates from
	"""
	sourceChain: String!

	"""
	Destination chain identifier where the order will be executed
	"""
	destChain: String!

	"""
	Unique commitment hash of the order used for verification
	"""
	commitment: String!

	"""
	Timestamp after which the order expires
	"""
	deadline: BigInt!

	"""
	Sequential number to ensure uniqueness of the order
	"""
	nonce: BigInt!

	"""
	Total fees supplied by the user for executing the order
	"""
	fees: BigInt!

	"""
	Optional session key used to select winning solver
	"""
	session: String

	"""
	Total input value in USD
	"""
	inputUSD: BigInt!

	"""
	Status of the order
	"""
	status: OrderStatus!

	"""
	Metatdata about the order's progression through different statuses
	"""
	statusMetadata: [IOrderV3StatusMetadata]! @derivedFrom(field: "order")

	"""
	Partial fill events for this order
	"""
	partialFills: [IOrderV3PartialFill!]! @derivedFrom(field: "order")

	"""
	Full fill events for this order (one per order — fires on the destination chain for cross-chain, or on the final partial fill for same-chain)
	"""
	fills: [IOrderV3Fill!]! @derivedFrom(field: "order")

	"""
	Escrow release events for this order (fires on the source chain after a successful fill)
	"""
	escrowReleases: [IOrderV3EscrowRelease!]! @derivedFrom(field: "order")

	"""
	Escrow refund events for this order (fires on the source chain after cancellation)
	"""
	escrowRefunds: [IOrderV3EscrowRefund!]! @derivedFrom(field: "order")

	"""
	Predispatch assets for this order
	"""
	predispatchAssets: [IOrderV3PredispatchAsset!]! @derivedFrom(field: "order")

	"""
	Pre dispatch calldata
	"""
	predispatchCalldata: String!

	"""
	Input assets for this order
	"""
	inputAssets: [IOrderV3InputAsset!]! @derivedFrom(field: "order")

	"""
	Output assets for this order
	"""
	outputAssets: [IOrderV3OutputAsset!]! @derivedFrom(field: "order")

	"""
	Post dispatch calldata
	"""
	postDispatchCalldata: String!

	"""
	Referrer address that referred the user
	"""
	referrer: String

	"""
	Timestamp when the order was created
	"""
	createdAt: Date! @index

	"""
	Block number where the order was placed
	"""
	blockNumber: BigInt! @index

	"""
	Timestamp of the block where the order was placed
	"""
	blockTimestamp: BigInt! @index

	"""
	Hash of the transaction that placed the order
	"""
	transactionHash: String! @index
}

