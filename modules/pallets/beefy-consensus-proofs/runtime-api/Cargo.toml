[package]
name = "pallet-beefy-consensus-proofs-runtime-api"
version = "0.1.0"
edition = "2021"
authors = ["Polytope Labs <hello@polytope.technology>"]
license = "Apache-2.0"
description = "Runtime API for pallet-beefy-consensus-proofs"
publish = false

[dependencies]
codec = { workspace = true, features = ["derive"] }
pallet-beefy-consensus-proofs = { workspace = true }

[dependencies.polkadot-sdk]
workspace = true
features = ["sp-api"]

[features]
default = ["std"]
std = [
    "polkadot-sdk/std",
    "codec/std",
    "pallet-beefy-consensus-proofs/std",
]
