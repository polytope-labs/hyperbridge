[package]
name = "hyperbridge-fisherman"
version = "0.1.0"
edition = "2021"
authors = ["Polytope Labs <hello@polytope.technology>"]
description = "Collator-side fisherman task. Watches L2 state machine updates across multiple RPC providers and submits veto extrinsics on disagreement."
publish = false

[dependencies]
anyhow = { workspace = true, default-features = true }
async-trait = "0.1"
futures = "0.3.28"
log = "0.4"
serde = { workspace = true, default-features = true, features = ["derive"] }
toml = "0.7.4"
tokio = { workspace = true, features = ["sync", "rt", "time", "macros"] }

alloy = { workspace = true, features = ["providers", "rpc-types", "network"] }

ismp = { workspace = true, default-features = true }
tesseract-config = { workspace = true }
tesseract-evm = { workspace = true }
tesseract-primitives = { workspace = true }
tesseract-substrate = { workspace = true }

[dependencies.polkadot-sdk]
workspace = true
default-features = true
features = ["sc-service"]
