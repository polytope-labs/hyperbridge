[package]
name = "gargantua-runtime"
version = "0.1.1"
authors = ["Polytope Labs <hello@polytope.technology>"]
description = "Parachain runtime implementation of the hyperbridge protocol"
edition = "2021"
publish = false

[build-dependencies]
substrate-wasm-builder = { workspace = true }

[dependencies]
codec = { workspace = true, features = ["derive"] }
hex-literal = { workspace = true, optional = true }
log = { workspace = true }
json = { workspace = true }
scale-info = { version = "2.3.1", default-features = false, features = [
    "derive",
] }
smallvec = "1.10.0"
anyhow = { workspace = true, default-features = false }
cumulus-pallet-parachain-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }

# local modules
ismp = { workspace = true }
pallet-ismp = { workspace = true }
pallet-fishermen = { workspace = true }
pallet-ismp-demo = { workspace = true }
pallet-beefy-consensus-proofs = { workspace = true }
pallet-ismp-runtime-api = { workspace = true }
ismp-sync-committee = { workspace = true }
ismp-bsc = { workspace = true }
ismp-parachain = { workspace = true }
ismp-grandpa = { workspace = true }
ismp-beefy = { workspace = true }
ismp-parachain-runtime-api = { workspace = true }
pallet-ismp-relayer = { workspace = true }
pallet-ismp-host-executive = { workspace = true }
pallet-call-decompressor = { workspace = true }
pallet-state-coprocessor = { workspace = true }
pallet-messaging-incentives = { workspace = true }
pallet-intents-coprocessor = { workspace = true }
pallet-mmr-tree = { workspace = true }
pallet-mmr-runtime-api = { workspace = true }
mmr-primitives = { workspace = true }
simnode-runtime-api = { workspace = true }

pallet-bandwidth = { workspace = true }

pallet-hyper-fungible-token = { workspace = true }

pallet-bridge-airdrop = { workspace = true }
ismp-arbitrum = { workspace = true }
ismp-optimism = { workspace = true }
ismp-polygon = { workspace = true }
ismp-pharos = { workspace =  true }
ismp-tendermint = { workspace = true }
evm-state-machine = { workspace = true }
substrate-state-machine = { workspace = true }

[dependencies.polkadot-sdk]
workspace = true
features = [
    "frame-executive",
    "frame-support",
    "frame-system",
    "frame-system-rpc-runtime-api",
    "pallet-aura",
    "pallet-authorship",
    "pallet-balances",
    "pallet-assets",
    "pallet-session",
    "pallet-sudo",
    "pallet-utility",
    "pallet-tx-pause",
    "pallet-timestamp",
    "pallet-transaction-payment",
    "pallet-transaction-payment-rpc-runtime-api",
    "pallet-message-queue",
    "pallet-treasury",
    "pallet-asset-rate",
    "pallet-collective",
    "sp-api",
    "sp-block-builder",
    "sp-consensus-aura",
    "sp-mmr-primitives",
    "sp-core",
    "sp-inherents",
    "sp-keyring",
    "sp-offchain",
    "sp-runtime",
    "sp-session",
    "sp-std",
    "sp-io",
    "sp-transaction-pool",
    "sp-version",
    "sp-storage",
    "sp-genesis-builder",
    "frame-metadata-hash-extension",
    "pallet-xcm",
    "polkadot-parachain-primitives",
    "polkadot-runtime-common",
    "staging-xcm",
    "staging-xcm-builder",
    "staging-xcm-executor",
    "cumulus-pallet-aura-ext",
    "cumulus-pallet-dmp-queue",
    "cumulus-pallet-parachain-system",
    "cumulus-pallet-session-benchmarking",
    "cumulus-pallet-xcm",
    "cumulus-pallet-xcmp-queue",
    "pallet-migrations",
    "cumulus-primitives-core",
    "cumulus-primitives-timestamp",
    "cumulus-primitives-aura",
    "cumulus-primitives-utility",
    "pallet-collator-selection",
    "staging-parachain-info",
    "parachains-common",
    "pallet-vesting",
    "sp-weights"
]

[features]
default = ["std"]
# Negatively-biased flag for `pallet-bandwidth`. Off by default, so the
# `Bandwidth` pallet is part of `construct_runtime!` and the bandwidth
# gate is wired into the ISMP router (`on_accept` / `on_response`).
# Turning this flag ON strips the pallet from the runtime: the `Bandwidth`
# entry is dropped, the gate becomes a no-op `BandwidthGate`, and none of
# the pallet's extrinsics are exposed. Release builds for testnet
# deployments enable this — see `scripts/build_release_runtime.sh`.
no-bandwidth = []
std = [
    "codec/std",
    "log/std",
    "json/std",
    "scale-info/std",
    "ismp/std",
    "polkadot-sdk/std",
    "pallet-fishermen/std",
    "pallet-ismp/std",
    "pallet-ismp-runtime-api/std",
    "pallet-ismp-demo/std",
    "pallet-beefy-consensus-proofs/std",
    "ismp-sync-committee/std",
    "ismp-bsc/std",
    "ismp-grandpa/std",
    "ismp-beefy/std",
    "ismp-parachain/std",
    "ismp-parachain-runtime-api/std",
    "pallet-ismp-relayer/std",
    "pallet-ismp-host-executive/std",
    "pallet-call-decompressor/std",
    "pallet-state-coprocessor/std",
    "pallet-messaging-incentives/std",
    "pallet-intents-coprocessor/std",
    "pallet-bandwidth/std",
    "pallet-mmr-tree/std",
    "pallet-mmr-runtime-api/std",
    "mmr-primitives/std",
    "simnode-runtime-api/std",
    "anyhow/std",
    "cumulus-pallet-parachain-system/std",
    "frame-benchmarking/std",
    "pallet-bridge-airdrop/std",
    "ismp-arbitrum/std",
    "ismp-optimism/std",
    "ismp-polygon/std",
    "ismp-tendermint/std",
    "evm-state-machine/std",
    "substrate-state-machine/std",
    "ismp-pharos/std",
    "pallet-hyper-fungible-token/std"
]
runtime-benchmarks = [
    "hex-literal",
    "frame-benchmarking/runtime-benchmarks",
    "polkadot-sdk/frame-system-benchmarking",
    "polkadot-sdk/runtime-benchmarks",
    "ismp-grandpa/runtime-benchmarks",
    "ismp-parachain/runtime-benchmarks",
    "pallet-intents-coprocessor/runtime-benchmarks",
    "pallet-beefy-consensus-proofs/runtime-benchmarks",
]
try-runtime = [
    "polkadot-sdk/try-runtime",
    "polkadot-sdk/frame-try-runtime",
    "pallet-ismp/try-runtime",
    "ismp-sync-committee/try-runtime",
    "pallet-ismp-demo/try-runtime",
    "pallet-beefy-consensus-proofs/try-runtime",
    "pallet-ismp-relayer/try-runtime",
    "pallet-ismp-host-executive/try-runtime",
    "pallet-mmr-tree/try-runtime",
    "cumulus-pallet-parachain-system/try-runtime",
]
# This must be used when buiding for a runtime upgrade so metadata hash verification is possible
metadata-hash = ["substrate-wasm-builder/metadata-hash"]
