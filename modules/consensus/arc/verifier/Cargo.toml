[package]
name = "arc-verifier"
version = "0.1.0"
edition = "2021"
description = "Arc consensus verifier for ISMP"
authors = ["Polytope Labs <hello@polytope.technology>"]
publish = false

[dependencies]
arc-primitives = { workspace = true, default-features = false }
evm-state-machine = { workspace = true, default-features = false }
geth-primitives = { workspace = true, default-features = false }
ismp = { workspace = true, default-features = false }
alloy-rlp = { workspace = true, default-features = false }
curve25519-dalek = { version = "4.1.3", default-features = false }
log = { workspace = true, default-features = false }
thiserror = { workspace = true, default-features = false }
primitive-types = { workspace = true, features = ["impl-codec"] }

[dependencies.polkadot-sdk]
workspace = true
features = ["sp-io", "sp-core"]
default-features = false

[features]
default = ["std"]
std = [
    "arc-primitives/std",
    "evm-state-machine/std",
    "geth-primitives/std",
    "ismp/std",
    "alloy-rlp/std",
    "log/std",
    "polkadot-sdk/std",
    "primitive-types/std",
    "thiserror/std",
]

[dev-dependencies]
polkadot-sdk = { workspace = true, features = ["sp-io", "sp-core", "std"] }
