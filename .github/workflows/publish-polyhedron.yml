name: Polyhedron Docker Publish

on:
    push:
        tags:
            - "polyhedron-v[0-9]+.[0-9]+.[0-9]+"

concurrency:
    group: release-polyhedron-${{ github.ref }}
    cancel-in-progress: true

env:
    TELEMETRY_SECRET_KEY: ${{ secrets.TELEMETRY_SECRET_KEY }}

jobs:
    build_and_publish:
        runs-on: release-runner
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout sources
              uses: actions/checkout@v3
              with:
                  token: ${{ secrets.GH_TOKEN }}
                  submodules: recursive

            - uses: webfactory/ssh-agent@v0.5.4
              with:
                  ssh-private-key: "${{ secrets.SSH_KEY }}"

            - name: Install toolchain
              uses: dtolnay/rust-toolchain@nightly
              with:
                  toolchain: stable

            - name: Add wasm toolchain
              run: |
                  rustup update nightly
                  rustup target add wasm32-unknown-unknown --toolchain nightly
                  rustup target add wasm32-unknown-unknown
                  rustup component add rust-src

            - name: Install Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y clang netcat wget curl libssl-dev llvm libclang-dev libudev-dev make protobuf-compiler pkg-config libsnappy-dev librocksdb-dev rocksdb-tools
                  echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Set up Node
              uses: actions/setup-node@v3
              with:
                  node-version: 22
                  cache-dependency-path: "evm/pnpm-lock.yaml"
                  cache: "pnpm"

            - name: Install npm dependencies
              working-directory: evm
              run: |
                  pnpm install

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: nightly

            - name: Build Foundry artifacts
              working-directory: evm
              run: forge build

            - name: Build polyhedron
              run: |
                  cargo build --release --bin polyhedron

            - name: Install cargo-get
              run: cargo install cargo-get

            - name: Resolve version
              id: version
              run: |
                  VERSION=$(cargo get package.version --entry ./tesseract/consensus/relayer)
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./scripts/docker/polyhedron.Dockerfile
                  push: true
                  tags: |
                      polytopelabs/polyhedron:v${{ steps.version.outputs.version }}
                      polytopelabs/polyhedron:latest
                      ghcr.io/${{ github.repository_owner }}/polyhedron:v${{ steps.version.outputs.version }}
                      ghcr.io/${{ github.repository_owner }}/polyhedron:latest
