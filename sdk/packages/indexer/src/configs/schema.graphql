"""
An application that has interacted with `pallet-bandwidth` on its
credit chain. ID is `${chain}-${appHex}` where `chain` is the
StateMachine string the credit landed on (= `BandwidthCredited.app_chain`)
and `appHex` is the lowercase hex of the `AppKey` bytes (no prefix).
"""
type BandwidthApp @entity {
	id: ID!

	"""
	StateMachine string of the credit chain. Differs from the payer
	chain on cross-chain sponsorship purchases.
	"""
	chain: String! @index

	"""
	Lowercase hex of the `AppKey` bytes (no 0x prefix).
	"""
	app: String! @index

	"""
	Block timestamp (ms) of the first purchase or force-credit that
	created a row for this app.
	"""
	firstSeenAt: BigInt!

	"""
	Block timestamp (ms) of the most recent event that touched this app.
	"""
	lastActivityAt: BigInt!

	"""
	Total number of subscriptions ever created (purchases + force credits).
	"""
	lifetimeSubscriptions: BigInt!

	"""
	Total bytes ever credited across all subscriptions.
	"""
	lifetimeBytesCredited: BigInt!

	"""
	Total bytes ever drained by the gate via `BandwidthConsumed` events.
	"""
	lifetimeBytesConsumed: BigInt!

	"""
	Sum of `lost_bytes` across `SubscriptionEvicted` events — bandwidth
	paid for but lost to the 1024-cap eviction.
	"""
	lifetimeBytesEvicted: BigInt!

	"""
	Running estimate of live subscriptions, derived from credit minus
	eviction minus full-drain events. Best-effort; resync from chain
	storage if exact count is needed.
	"""
	activeSubscriptions: Int!
}

"""
Per-`(app, tier)` lifetime aggregate. Lets a frontend show "App X
has bought N Tier1 subs over its lifetime" without scanning history.
ID is `${chain}-${appHex}-${tier}`.
"""
type BandwidthAppTierStats @entity @compositeIndexes(fields: [["app", "tier"]]) {
	id: ID!

	"""
	Parent app entity.
	"""
	app: BandwidthApp!

	"""
	Tier discriminant on the wire (1..4).
	"""
	tier: Int! @index

	"""
	Total subscriptions of this tier ever bought (purchases + force credits).
	"""
	lifetimeSubscriptions: BigInt!

	"""
	Total bytes credited via subscriptions of this tier.
	"""
	lifetimeBytesCredited: BigInt!

	"""
	Bytes lost to eviction via subscriptions of this tier.
	"""
	lifetimeBytesEvicted: BigInt!

	"""
	Running count of live subscriptions of this tier.
	"""
	activeSubscriptions: Int!

	"""
	Block timestamp (ms) of the most recent purchase of this tier.
	"""
	lastPurchasedAt: BigInt!
}

"""
One row per subscription created on `pallet-bandwidth` — i.e. per
`BandwidthCredited` or `ForceCredited` event. Acts as the per-app
purchase history. ID is `${chain}-${appHex}-${block}-${eventIdx}`.
"""
type BandwidthSubscription
	@entity
	@compositeIndexes(fields: [["app", "purchasedAt"], ["app", "tier"]]) {
	id: ID!

	"""
	Parent app entity.
	"""
	app: BandwidthApp!

	"""
	Tier discriminant on the wire (1..4).
	"""
	tier: Int! @index

	"""
	Bytes credited at purchase time. Scaled by months on bulk buys.
	"""
	bytes: BigInt!

	"""
	Unix seconds (from the event payload) at which this sub expires.
	Fixed at purchase time, never extends.
	"""
	expiresAt: BigInt!

	"""
	Block timestamp (ms) at which the subscription was created.
	"""
	purchasedAt: BigInt!

	"""
	StateMachine string of the chain that paid for this subscription.
	Differs from `app.chain` on cross-chain sponsorship.
	"""
	paidFrom: String!

	"""
	True if the row was created by an admin `ForceCredited` event
	rather than an end-user `BandwidthCredited` purchase.
	"""
	forced: Boolean!

	"""
	Block timestamp (ms) at which the 1024-cap evicted this sub. Null
	if still live (or naturally expired).
	"""
	evictedAt: BigInt

	"""
	`lost_bytes` from the matching `SubscriptionEvicted` event. Null if
	never evicted.
	"""
	evictedLostBytes: BigInt

	"""
	Hyperbridge block this sub was created in.
	"""
	blockNumber: BigInt!

	"""
	Extrinsic hash of the originating ISMP message handler (or
	`force_credit` call).
	"""
	extrinsicHash: String
}

"""
Daily bandwidth consumed per `(chain, app)`. Aggregated from
