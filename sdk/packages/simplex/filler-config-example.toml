# Hyperbridge Intent Filler Simplified Configuration
# This is a minimal configuration file that leverages the SDK's built-in chain configurations
# Copy this file to filler-config.toml and update with your actual values

# Filler configuration
[simplex]
# Signer is a tagged union — set type, then add the variant's fields directly.
#
# 1) Private key signer:
# [simplex.signer]
# type = "privateKey"
# key = "0x..."
#
# 2) MPCVault signer:
# [simplex.signer]
# type = "mpcVault"
# apiToken = ""
# vaultUuid = ""
# accountAddress = "0x0000000000000000000000000000000000000000"
# callbackClientSignerPublicKey = "ssh-ed25519 AAAA..."
# grpcTarget = "api.mpcvault.com:443" # optional; default when omitted
#
# 3) Turnkey signer:
# [simplex.signer]
# type = "turnkey"
# organizationId = ""
# apiPublicKey = ""
# apiPrivateKey = ""
# signWith = "0xYourWalletAddress"

maxConcurrentOrders = 5

# ===== Solver Selection Mode Configuration =====
# Required when solver selection is active on any chain

# Substrate private key for signing Hyperbridge extrinsics
# Can be a hex seed (without 0x prefix) or mnemonic phrase
# Note: Submitting bids to Hyperbridge requires BRIDGE tokens for transaction fees
substratePrivateKey = ""

# Hyperbridge WebSocket URL
hyperbridgeWsUrl = ""

# Gas fee bump configuration (optional)
# These values control how much to bump gas fees for UserOperation submission
# Both are percentages added ON TOP of the base gasPrice
# If not provided, defaults will be used (8% for priority fee, 10% for max fee)
# [simplex.gasFeeBump]
# maxPriorityFeePerGasBumpPercent = 8   # Percentage added to gasPrice for priority fee (default: 8)
# maxFeePerGasBumpPercent = 10          # Percentage added to gasPrice for max fee (default: 10)

# Overfill protection (optional)
# Bounds per-leg loss when internal pricing is wrong (bug, stale cache, manipulated venue).
# The filler clamps its computed output to at most (1 + maxOverfillBps) × user-requested amount.
# After `maxConsecutiveClamps` consecutive orders where the clamp activated, the strategy
# halts itself — likely a systemic pricing error — and requires operator restart.
# If not provided, defaults will be used (maxOverfillBps = 500, maxConsecutiveClamps = 3)
# [simplex.overfillProtection]
# maxOverfillBps = 500          # 5% ceiling above user-requested output (default: 500)
# maxConsecutiveClamps = 3      # Halt threshold (default: 3)


# Logging level: trace, debug, info, warn, error
logging = "debug"

# Queue configuration
[simplex.queue]
maxRechecks = 10
recheckDelayMs = 30000  # 30 seconds

# Rebalancing configuration
# Trigger percentage: rebalancing triggers when balance falls to (1 - triggerPercentage) * baseBalance
# Example: triggerPercentage = 0.5 means trigger when balance <= 50% of base
[rebalancing]
triggerPercentage = 0.5

# Base balances per chain and per asset (in USD value, treated as $1 per token)
# Format: [rebalancing.baseBalances."USDC"] or [rebalancing.baseBalances."USDT"]
# Then specify per chainId as string keys
[rebalancing.baseBalances."USDC"]
"1" = "10000"      # Ethereum Mainnet: $10k USDC base
"56" = "10000"     # BSC Mainnet: $10k USDC base
"42161" = "10000"  # Arbitrum: $10k USDC base
"8453" = "10000"   # Base: $10k USDC base
"137" = "10000"    # Polygon: $10k USDC base
"130" = "10000"    # Unichain: $10k USDC base

[rebalancing.baseBalances."USDT"]
"1" = "10000"      # Ethereum Mainnet: $10k USDT base
"56" = "10000"     # BSC Mainnet: $10k USDT base
"42161" = "10000"  # Arbitrum: $10k USDT base
"8453" = "10000"   # Base: $10k USDT base
"137" = "10000"    # Polygon: $10k USDT base
"130" = "10000"    # Unichain: $10k USDT base

# Allowlist configuration (optional)
# Restricts which order `user` addresses the filler will process.
# - Omit the entire [allowlist] section to accept orders from all users (default).
# - When present, only listed users are accepted. A source chain whose merged set
#   (global `users` + its bySource override) is empty rejects every order.
# - Address comparisons are case-insensitive.
#
# [allowlist]
# Users eligible across all source chains:
# users = [
#     "0x1111111111111111111111111111111111111111",
# ]
#
# Per-source-chain overrides, keyed by state machine id. Merged with the global list.
# [allowlist.bySource]
# "EVM-1"     = ["0x2222222222222222222222222222222222222222"]  # Ethereum-only partner
# "EVM-42161" = ["0x3333333333333333333333333333333333333333"]  # Arbitrum-only partner

# Strategy configuration
# You can configure multiple strategies
# All strategies use the configured simplex signer (privateKey or mpcVault)
[[strategies]]
type = "basic"
# Filler BPS (basis points) curve based on order value
# Uses polynomial interpolation to create a smooth curve through all points
# - Small orders: Higher BPS to make filling worthwhile
# - Large orders: Lower BPS to be more competitive
bpsCurve = [
    { amount = "100", value = 100 },      # $100 orders: 1% margin
    { amount = "1000", value = 50 },      # $1000 orders: 0.5% margin
    { amount = "10000", value = 25 },     # $10000 orders: 0.25% margin
    { amount = "100000", value = 10 },    # $100000 orders: 0.1% margin
]

# Per-chain confirmation policies for this strategy (optional).
# Uses polynomial interpolation to create a smooth curve through all points.
# The chain ID should match the numeric ID from the chain configuration.
# Sensible defaults are merged in for chains you don't list (ETH, BSC, Polygon, Base, Arbitrum).
[strategies.confirmationPolicies."1"]  # Ethereum Mainnet
points = [
    { amount = "5", value = 3 },
    { amount = "500", value = 6 },
    { amount = "5000", value = 12 },
]

[strategies.confirmationPolicies."56"]  # BSC Mainnet
points = [
    { amount = "1", value = 3 },
    { amount = "500", value = 6 },
    { amount = "5000", value = 15 },
]

[strategies.confirmationPolicies."42161"]  # Arbitrum Mainnet
points = [
    { amount = "2", value = 2 },
    { amount = "1000", value = 5 },
    { amount = "8000", value = 10 },
]

[strategies.confirmationPolicies."8453"]  # Base Mainnet
points = [
    { amount = "2", value = 2 },
    { amount = "1000", value = 5 },
    { amount = "8000", value = 10 },
]

[strategies.confirmationPolicies."137"]  # Polygon Mainnet
points = [
    { amount = "2", value = 2 },
    { amount = "1000", value = 5 },
    { amount = "8000", value = 10 },
]

[strategies.confirmationPolicies."130"]  # Unichain Mainnet
points = [
    { amount = "2", value = 2 },
    { amount = "1000", value = 5 },
    { amount = "8000", value = 10 },
]

# HyperFX strategy for exotic token swaps (e.g. stablecoin <-> cNGN)
# Uncomment and configure to enable
# [[strategies]]
# type = "hyperfx"
# maxOrderUsd = 5000
# # Optional spread (basis points) around Uniswap V4 mid when using vault.uniswapV4 for pricing
# spreadBps = 50
#
# # Bid/ask curves: omit both when [strategies.vault.uniswapV4].positions is set (pool-based pricing).
# # Bid price curve: exotic per USD when *buying* exotic from a user (exotic→stable leg)
# bidPriceCurve = [
#     { amount = "100",  price = "1580" },
#     { amount = "1000", price = "1575" },
#     { amount = "5000", price = "1570" },
# ]
#
# # Ask price curve: exotic per USD when *selling* exotic to a user (stable→exotic leg)
# askPriceCurve = [
#     { amount = "100",  price = "1560" },
#     { amount = "1000", price = "1555" },
#     { amount = "5000", price = "1550" },
# ]
#
# [strategies.token1]
# "EVM-56"  = "0xExoticTokenAddressOnBsc"
# "EVM-137" = "0xExoticTokenAddressOnPolygon"
#
# # Auto-funding from on-chain liquidity (optional)
# # When wallet balance is insufficient, Simplex withdraws from these positions atomically
#
# [strategies.vault.uniswapV4]
# positions = [
#     { chain = "EVM-8453", tokenId = "123456789" },
# ]
#


# Phantom order generator (optional)
# Places expired same-chain swaps to collect price and liquidity bids from fillers.
# Requires hyperbridgeWsUrl and substratePrivateKey to be set in [simplex].
#
# [phantom_generator]
# enabled = true
# chain = "EVM-8453"        # Chain where phantom orders are placed
# interval_hours = 1        # How often to run a round (default: 1 hour)
#
# [[phantom_generator.token_pairs]]
# token_a = "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48"  # USDC
# token_b = "0xdac17f958d2ee523a2206206994597c13d831ec7"  # USDT
# standard_amount = "1000000000"   # 1000 USDC (6 decimals)
# min_output = "990000000"         # 990 USDT minimum


# Chain configuration - RPC and bundler URLs are required
# Chain IDs are resolved automatically from the RPC endpoints.
# All other chain data (addresses, assets, etc.) comes from the SDK automatically.
#
# `rpcUrls` is always an array. Providing more than one URL enables quorum-mode log scanning:
# the event monitor fans every `eth_getLogs` batch out to all providers and requires identical
# results. Any provider failure or divergence fails the batch. URLs must resolve to different
# hostnames.
[[chains]]
rpcUrls = [""]      # Ethereum Mainnet — add more endpoints to enable quorum
bundlerUrl = ""     # ERC-4337 bundler (e.g. Pimlico)

[[chains]]
rpcUrls = [""]      # BSC Mainnet
bundlerUrl = ""

[[chains]]
rpcUrls = [""]      # Arbitrum Mainnet
bundlerUrl = ""

[[chains]]
rpcUrls = [""]      # Base Mainnet
bundlerUrl = ""

[[chains]]
rpcUrls = [""]      # Polygon Mainnet
bundlerUrl = ""

[[chains]]
rpcUrls = [""]      # Unichain Mainnet
bundlerUrl = ""


