[package]
name = "pallet-token-gateway"
version = "1.15.2"
edition = "2021"
description = "A substrate implementation of the token gateway protocol"
authors = ["Polytope Labs <hello@polytope.technology>"]
license = "Apache-2.0"
repository = "https://github.com/polytope-labs/hyperbridge"
homepage = "https://docs.hyperbridge.network/developers/polkadot/tokengateway"
documentation = "https://docs.rs/pallet-token-gateway"
keywords = ["substrate", "polkadot-sdk", "ISMP", "interoperability", "pallet-assets"]
readme = "./README.md"

[dependencies]
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-runtime = { workspace = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
primitive-types = { workspace = true }

ismp = { workspace = true }
pallet-ismp = { workspace = true }

log = { workspace = true }
codec = { workspace = true }
scale-info = { workspace = true }
anyhow = { workspace = true }

alloy-primitives = { workspace = true }
alloy-sol-macro = { workspace = true }
alloy-sol-types = { workspace = true }

token-gateway-primitives = { workspace = true }
pallet-hyperbridge = { workspace = true }

pallet-balances = { workspace = true }
pallet-timestamp = { workspace = true }
ismp-parachain = { workspace = true }
frame-benchmarking = { optional = true, workspace = true }

[dev-dependencies]
cumulus-pallet-parachain-system = { workspace = true,  default-features = false }
pallet-message-queue = { workspace = true}
polkadot-parachain-primitives = { workspace = true}
cumulus-primitives-core = { workspace = true}
polkadot-core-primitives = { workspace = true}
pallet-mmr = { workspace = true }
sp-mmr-primitives = { workspace = true }
hyperbridge-client-machine = { workspace = true}
pallet-ismp-host-executive = { workspace = true}
ismp-testsuite = { workspace = true }
pallet-assets = {workspace = true}
frame-benchmarking = { workspace = true, features = ["runtime-benchmarks"] }
frame-support = { workspace = true, features = ["runtime-benchmarks"] }
frame-system = { workspace = true, features = ["runtime-benchmarks"] }

[features]
default = ["std"]
std = [
    "frame-support/std",
    "frame-benchmarking?/std",
    "frame-system/std",
    "sp-runtime/std",
    "sp-core/std",
    "sp-io/std",
    "primitive-types/std",
    "ismp/std",
    "pallet-ismp/std",
    "log/std",
    "scale-info/std",
    "anyhow/std",
    "alloy-primitives/std",
    "pallet-hyperbridge/std",
    "token-gateway-primitives/std",
    "pallet-balances/std",
    "pallet-timestamp/std",
    "ismp-parachain/std",
    "cumulus-pallet-parachain-system/std",
    "pallet-message-queue/std",
    "polkadot-parachain-primitives/std",
    "cumulus-primitives-core/std",
    "polkadot-core-primitives/std",
    "pallet-mmr/std",
    "sp-mmr-primitives/std",
    "hyperbridge-client-machine/std",
    "pallet-ismp-host-executive/std",
    "pallet-assets/std"
]

runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sp-runtime/runtime-benchmarks",
]

try-runtime = []
