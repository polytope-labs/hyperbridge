<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 250" fill="none">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <rect width="860" height="250" rx="8" fill="#111"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#ccc" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace" font-size="15" font-weight="600">Order Lifecycle</text>

  <!-- Step 1: Place -->
  <rect x="20" y="60" width="130" height="60" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="85" y="80" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="9">1</text>
  <text x="85" y="96" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Place Order</text>
  <text x="85" y="110" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="8">escrow + fees</text>

  <!-- Arrow 1->2 -->
  <line x1="150" y1="90" x2="185" y2="90" stroke="#555" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Step 2: Auction -->
  <rect x="195" y="60" width="130" height="60" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="260" y="80" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="9">2</text>
  <text x="260" y="96" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Auction</text>
  <text x="260" y="110" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="8">solvers bid UserOps</text>

  <!-- Arrow 2->3 -->
  <line x1="325" y1="90" x2="360" y2="90" stroke="#555" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Step 3: Select -->
  <rect x="370" y="60" width="130" height="60" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="435" y="80" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="9">3</text>
  <text x="435" y="96" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Select</text>
  <text x="435" y="110" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="8">pick best UserOp</text>

  <!-- Arrow 3->4 -->
  <line x1="500" y1="90" x2="535" y2="90" stroke="#555" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Step 4: Fill -->
  <rect x="545" y="60" width="130" height="60" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="610" y="80" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="9">4</text>
  <text x="610" y="96" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Fill Order</text>
  <text x="610" y="110" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="8">solver sends output</text>

  <!-- Arrow 4->5 -->
  <line x1="675" y1="90" x2="710" y2="90" stroke="#555" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Step 5: Settle -->
  <rect x="720" y="60" width="120" height="60" rx="3" fill="none" stroke="#666" stroke-width="1"/>
  <text x="780" y="80" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="9">5</text>
  <text x="780" y="96" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Settle</text>
  <text x="780" y="110" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="8">escrow released</text>

  <!-- Cancel branch from step 2 -->
  <path d="M 260 120 L 260 175 L 390 175" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="310" y="165" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">unfilled?</text>

  <!-- Cancel box -->
  <rect x="400" y="155" width="130" height="45" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="465" y="176" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Cancel</text>
  <text x="465" y="192" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="8">refund escrowed tokens</text>

  <!-- Event labels -->
  <text x="85" y="235" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="8">OrderPlaced</text>
  <text x="610" y="235" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="8">OrderFilled</text>
  <text x="780" y="235" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="8">EscrowReleased</text>
</svg>
