name: "Publish @hyperbridge/simplex"

on:
    push:
        tags:
            - "simplex-v[0-9]+.[0-9]+.[0-9]+"

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build_and_publish:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: sdk
        steps:
            - name: Checkout sources
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"

            - name: Install pnpm
              run: npm install -g pnpm@10.30.3

            - name: Extract version from tag
              id: get-version
              run: echo "VERSION=${GITHUB_REF#refs/tags/simplex-v}" >> $GITHUB_ENV

            - name: Install dependencies
              run: pnpm install

            - name: Build SDK (dependency for simplex)
              run: cd packages/sdk && pnpm build

            - name: Build Simplex
              run: cd packages/simplex && pnpm build

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Build and push Docker image
              uses: docker/build-push-action@v4
              with:
                  context: sdk
                  file: sdk/packages/simplex/scripts/Dockerfile
                  push: true
                  tags: |
                      polytopelabs/simplex:v${{ env.VERSION }}
                      polytopelabs/simplex:latest
                  platforms: linux/amd64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    generate-changelog:
        runs-on: ubuntu-latest
        needs: build_and_publish
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get previous tag
              id: previous-tag
              run: |
                  CURRENT_TAG=${GITHUB_REF#refs/tags/}
                  PREVIOUS_TAG=$(git tag -l "simplex-v*" --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n1)
                  echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
                  echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
                  echo "clean_tag=${CURRENT_TAG#simplex-}" >> $GITHUB_OUTPUT

            - name: Generate changelog
              id: changelog
              run: |
                  CURRENT_TAG=${{ steps.previous-tag.outputs.current_tag }}
                  PREVIOUS_TAG=${{ steps.previous-tag.outputs.previous_tag }}

                  echo "Generating changelog for ${CURRENT_TAG}"
                  echo "Previous tag: ${PREVIOUS_TAG}"

                  if [ -z "$PREVIOUS_TAG" ]; then
                    COMMIT_RANGE="HEAD"
                  else
                    COMMIT_RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
                  fi

                  CHANGELOG=$(git log --pretty=format:"* %s (%h)" $COMMIT_RANGE --reverse | grep -i "simplex")

                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "## What's Changed" >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT
                  echo "$CHANGELOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.POLYTOPE_GITHUB_TOKEN }}
              with:
                  tag_name: ${{ steps.previous-tag.outputs.current_tag }}
                  release_name: "@hyperbridge/simplex ${{ steps.previous-tag.outputs.clean_tag }}"
                  body: ${{ steps.changelog.outputs.changelog }}
                  draft: false
                  prerelease: false
