[package]
name = "pallet-beefy-consensus-proofs-rpc"
version = "0.1.0"
edition = "2021"
authors = ["Polytope Labs <hello@polytope.technology>"]
license = "Apache-2.0"
description = "RPC for pallet-beefy-consensus-proofs"
publish = false

[dependencies]
anyhow = { workspace = true }
codec = { workspace = true, features = ["derive"], default-features = true }
jsonrpsee = { workspace = true, features = ["client-core", "server", "macros"] }
serde = { workspace = true, features = ["derive"], default-features = true }

pallet-beefy-consensus-proofs = { workspace = true, default-features = true }
pallet-beefy-consensus-proofs-runtime-api = { path = "../runtime-api", default-features = true }
pallet-ismp-rpc = { workspace = true, default-features = true }

[dependencies.polkadot-sdk]
workspace = true
default-features = true
features = [
    "sp-api",
    "sp-blockchain",
    "sp-core",
    "sp-runtime",
    "sc-client-api",
]
