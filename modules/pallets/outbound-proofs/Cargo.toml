[package]
name = "pallet-outbound-proofs"
version = "0.1.0"
edition = "2021"
authors = ["Polytope Labs <hello@polytope.technology>"]
license = "Apache-2.0"
description = "Pallet for storing and rewarding outbound consensus proofs on Hyperbridge"
publish = false

[dependencies]
codec = { workspace = true }
ismp = { workspace = true, default-features = false }
pallet-ismp = { workspace = true }
beefy-verifier = { workspace = true, default-features = false }
beefy-verifier-primitives = { workspace = true, default-features = false }
anyhow = { workspace = true, default-features = false }
primitive-types = { workspace = true, default-features = false }
scale-info = { workspace = true }
hex-literal = { workspace = true, optional = true }

[dependencies.polkadot-sdk]
workspace = true
features = ["frame-support", "frame-system", "sp-io", "sp-runtime"]

[features]
default = ["std"]
std = [
    "polkadot-sdk/std",
    "codec/std",
    "ismp/std",
    "pallet-ismp/std",
    "beefy-verifier/std",
    "beefy-verifier-primitives/std",
    "anyhow/std",
    "primitive-types/std",
    "scale-info/std",
]
runtime-benchmarks = [
    "polkadot-sdk/frame-benchmarking",
    "polkadot-sdk/runtime-benchmarks",
    "dep:hex-literal",
]
try-runtime = ["polkadot-sdk/try-runtime"]
