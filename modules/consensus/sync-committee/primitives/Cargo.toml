[package]
name = "sync-committee-primitives"
version = "0.1.1"
edition = "2021"
authors = ["Polytope Labs"]
publish = false

[dependencies]
hex-literal = { workspace = true }
codec = { workspace = true, features = ["derive"] }
primitive-types = { workspace = true, features = [
    "serde_no_std",
    "impl-codec",
] }
serde = { workspace = true, optional = true, features = ["derive"] }
hex = { workspace = true, default-features = false, features = ["alloc"] }
anyhow = { workspace = true, default-features = false }
serde-hex-utils = { workspace = true, default-features = false }
bls-utils = { workspace = true, default-features = false }

ssz-rs = { git = "https://github.com/polytope-labs/ssz-rs", branch = "main", default-features = false }

# Always compiled: the execution header path (`execution_header.rs`) is now part of the
# fork-agnostic verifier, so these can no longer be gated behind `glamsterdam`.
alloy-primitives = { workspace = true }
alloy-rlp = { workspace = true }
alloy-rlp-derive = { workspace = true }


[features]
default = ["std"]
std = [
    "ssz-rs/default",
    "ssz-rs/serde",
    'codec/std',
    "primitive-types/std",
    "anyhow/std",
    "primitive-types/std",
    "serde",
    "serde-hex-utils/std",
    "bls-utils/std",
    "alloy-primitives/std",
    "alloy-primitives/serde",
    "alloy-rlp/std",
]
nofulu = []
# Gloas (EIP-7732) consensus types for the prover's `BeaconState`/`BeaconBlockBody` ssz layout.
# The verifier no longer needs this: it dispatches the execution path at runtime on the enum in
# `ExecutionPayloadProof`, so only the prover, whose ssz layout is fixed at compile time, still
# selects the fork here.
glamsterdam = []
