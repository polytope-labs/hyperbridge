name: Tesseract Docker Publish

on:
    push:
        tags:
            - "tesseract-consensus-v[0-9]+.[0-9]+.[0-9]+"

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build_and_publish:
        runs-on: release-runner
        steps:
            - name: Checkout sources
              uses: actions/checkout@v3
              with:
                  token: ${{ secrets.GH_TOKEN }}
                  submodules: recursive

            - uses: webfactory/ssh-agent@v0.5.4
              with:
                  ssh-private-key: "${{ secrets.SSH_KEY }}"

            - name: Install toolchain
              uses: dtolnay/rust-toolchain@nightly
              with:
                  toolchain: stable

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Set up Node
              uses: actions/setup-node@v3
              with:
                  node-version: 22
                  cache-dependency-path: "evm/pnpm-lock.yaml"
                  cache: "pnpm"

            - name: Install npm dependencies
              working-directory: evm
              run: |
                  pnpm install

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: nightly

            - name: Build Foundry artifacts
              working-directory: evm
              run: forge build

            - name: Build
              run: |
                  sudo apt-get update -y
                  sudo apt-get install -y clang netcat wget curl libssl-dev llvm libudev-dev make protobuf-compiler pkg-config
                  cargo build --release -p tesseract-consensus
            - name: Install Cargo get
              run: cargo install cargo-get

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

            - name: Build the Docker image
              run: docker build -t polytopelabs/tesseract-consensus:v$(cargo get package.version --entry ./tesseract/consensus/relayer) -t polytopelabs/tesseract-consensus:latest -f ./scripts/docker/consensus.Dockerfile .

            - name: Docker Push
              run: |
                  docker push polytopelabs/tesseract-consensus:v$(cargo get package.version --entry ./tesseract/consensus/relayer)
                  docker push polytopelabs/tesseract-consensus:latest
