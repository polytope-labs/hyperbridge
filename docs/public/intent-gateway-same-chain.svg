<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" fill="none">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <rect width="760" height="280" rx="8" fill="#111"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" fill="#ccc" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace" font-size="15" font-weight="600">Same-Chain Swap</text>
  <text x="380" y="48" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="10">atomic settlement -- supports partial fills</text>

  <!-- Chain boundary -->
  <rect x="25" y="65" width="710" height="160" rx="4" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="45" y="82" fill="#555" font-family="ui-monospace, monospace" font-size="9">same chain</text>

  <!-- User -->
  <rect x="45" y="100" width="130" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="110" y="124" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="12" font-weight="600">User</text>
  <text x="110" y="142" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">100 USDC</text>

  <!-- Arrow User -> Gateway -->
  <line x1="175" y1="118" x2="245" y2="118" stroke="#555" stroke-width="1" marker-end="url(#ah)"/>
  <text x="210" y="110" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="8">100 USDC</text>

  <!-- Gateway -->
  <rect x="255" y="95" width="160" height="65" rx="3" fill="none" stroke="#666" stroke-width="1"/>
  <text x="335" y="118" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">IntentGateway</text>
  <text x="335" y="134" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">escrow: 100 USDC</text>
  <text x="335" y="148" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">holds tokens</text>

  <!-- Arrow Gateway -> Solver -->
  <line x1="415" y1="118" x2="490" y2="118" stroke="#555" stroke-width="1" marker-end="url(#ah)"/>
  <text x="452" y="110" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="8">100 USDC</text>

  <!-- Solver -->
  <rect x="500" y="100" width="130" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="565" y="124" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="12" font-weight="600">Solver</text>
  <text x="565" y="142" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">fills order</text>

  <!-- Arrow Solver -> User (below) -->
  <path d="M 565 155 L 565 190 L 110 190 L 110 155" stroke="#888" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <text x="340" y="206" text-anchor="middle" fill="#999" font-family="ui-monospace, monospace" font-size="10">99 DAI sent to User</text>

  <!-- Tags -->
  <text x="565" y="248" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="9">[atomic]  [partial fills]</text>
</svg>
