<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <rect width="860" height="380" rx="8" fill="#111"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#ccc" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace" font-size="15" font-weight="600">Cancel from Source Chain</text>

  <!-- Source Chain (left) -->
  <rect x="20" y="60" width="240" height="185" rx="4" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="140" y="80" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Source Chain</text>

  <rect x="45" y="98" width="190" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="140" y="117" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">cancelOrder()</text>
  <text x="140" y="138" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">storage read request</text>

  <text x="140" y="185" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">reads order status on</text>
  <text x="140" y="200" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">destination chain</text>
  <text x="140" y="230" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">escrow: 100 USDT</text>

  <!-- Hyperbridge (middle) -->
  <rect x="310" y="60" width="240" height="185" rx="4" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="430" y="80" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Hyperbridge</text>

  <rect x="335" y="98" width="190" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="430" y="117" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Relayer</text>
  <text x="430" y="138" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">provides storage proofs</text>

  <text x="430" y="185" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">verifies order unfilled</text>
  <text x="430" y="200" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">past deadline</text>

  <!-- Destination Chain (right) -->
  <rect x="600" y="60" width="240" height="185" rx="4" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="720" y="80" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Destination Chain</text>

  <rect x="625" y="98" width="190" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="720" y="117" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Storage</text>
  <text x="720" y="138" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">order unfilled</text>

  <!-- Arrow: Source -> Hyperbridge (storage read request) -->
  <path d="M 260 115 L 335 115" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="297" y="108" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">1. GET request</text>

  <!-- Arrow: Hyperbridge -> Destination (read storage) -->
  <path d="M 550 115 L 625 115" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="587" y="108" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">2. read</text>

  <!-- Arrow: Hyperbridge -> Source (response with data) -->
  <path d="M 335 140 L 260 140" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="297" y="152" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">3. response</text>

  <!-- User (bottom) -->
  <rect x="170" y="300" width="520" height="50" rx="4" fill="none" stroke="#666" stroke-width="1"/>
  <text x="430" y="322" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="13" font-weight="600">User</text>
  <text x="430" y="340" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">escrowed tokens refunded</text>

  <!-- Arrow: User -> Source (cancel) -->
  <path d="M 270 300 L 140 245" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <text x="175" y="280" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">cancelOrder()</text>

  <!-- Arrow: Source -> User (refund) -->
  <path d="M 200 245 L 350 300" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="310" y="272" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">4. refund</text>
</svg>
