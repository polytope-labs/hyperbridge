name: Prover Docker Publish

on:
    push:
        tags:
            - "prover-v[0-9]+.[0-9]+.[0-9]+"
    workflow_dispatch:

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build_and_publish:
        runs-on: release-runner
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_TOKEN }}
                  submodules: recursive

            # Forwarded to `docker build --ssh default` so cargo can fetch the
            # private polytope-labs/sp1-beefy dep inside the builder stage.
            - uses: webfactory/ssh-agent@v0.5.4
              with:
                  ssh-private-key: "${{ secrets.SSH_KEY }}"

            - name: Resolve version
              id: version
              run: |
                  sudo apt-get update -y && sudo apt-get install -y jq
                  VERSION=$(grep '^version' tesseract/consensus/relayer/Cargo.toml | head -1 | sed -E 's/.*"(.+)".*/\1/')
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./scripts/docker/prover.Dockerfile
                  push: true
                  ssh: default
                  build-args: |
                      HYPERBRIDGE_REF=${{ github.sha }}
                  tags: |
                      polytopelabs/prover:v${{ steps.version.outputs.version }}
                      polytopelabs/prover:latest
                      ghcr.io/${{ github.repository_owner }}/prover:v${{ steps.version.outputs.version }}
                      ghcr.io/${{ github.repository_owner }}/prover:latest
                      ghcr.io/${{ github.repository_owner }}/prover:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    generate-changelog:
        runs-on: ubuntu-latest
        needs: build_and_publish
        if: startsWith(github.ref, 'refs/tags/prover-v')
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get previous tag
              id: previous-tag
              run: |
                  CURRENT_TAG=${GITHUB_REF#refs/tags/}
                  PREVIOUS_TAG=$(git tag -l "prover-v*" --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n1)
                  echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
                  echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
                  echo "clean_tag=${CURRENT_TAG#prover-}" >> $GITHUB_OUTPUT

            - name: Generate changelog
              id: changelog
              run: |
                  CURRENT_TAG=${{ steps.previous-tag.outputs.current_tag }}
                  PREVIOUS_TAG=${{ steps.previous-tag.outputs.previous_tag }}
                  CLEAN_TAG=${{ steps.previous-tag.outputs.clean_tag }}
                  OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

                  if [ -z "$PREVIOUS_TAG" ]; then
                    COMMIT_RANGE="HEAD"
                  else
                    COMMIT_RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
                  fi

                  CHANGELOG=$(git log --pretty=format:"* %s (%h)" $COMMIT_RANGE --reverse | grep -iE "beefy|prover|zk|sp1" || true)

                  {
                    echo "changelog<<EOF"
                    echo "## What's Changed"
                    echo ""
                    echo "$CHANGELOG"
                    echo ""
                    echo "## Pulling the image"
                    echo ""
                    echo "Docker Hub:"
                    echo ""
                    echo '```sh'
                    echo "docker pull polytopelabs/prover:${CLEAN_TAG}"
                    echo "docker pull polytopelabs/prover:latest"
                    echo '```'
                    echo ""
                    echo "GitHub Container Registry:"
                    echo ""
                    echo '```sh'
                    echo "docker pull ghcr.io/${OWNER}/prover:${CLEAN_TAG}"
                    echo "docker pull ghcr.io/${OWNER}/prover:latest"
                    echo '```'
                    echo "EOF"
                  } >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ steps.previous-tag.outputs.current_tag }}
                  release_name: "Prover ${{ steps.previous-tag.outputs.clean_tag }}"
                  body: ${{ steps.changelog.outputs.changelog }}
                  draft: false
                  prerelease: false
