[package]
name = "bls-utils"
version = "0.1.0"
edition = "2021"
authors = ["Polytope Labs <hello@polytope.technology>"]
license = "Apache-2.0"
repository = "https://github.com/polytope-labs/hyperbridge"
description = "BLS12-381 and SSZ ByteVector utilities for consensus clients"
publish = false

[dependencies]
codec = { workspace = true }
serde = { workspace = true, optional = true }
ssz-rs = { git = "https://github.com/polytope-labs/ssz-rs", branch = "main", default-features = false }
serde-hex-utils = { workspace = true, default-features = false }
bls = { workspace = true, default-features = false }

[features]
default = ["std"]
std = [
    "codec/std",
    "serde",
    "serde/std",
    "ssz-rs/default",
    "ssz-rs/serde",
    "serde-hex-utils/std",
    "bls/std",
]
