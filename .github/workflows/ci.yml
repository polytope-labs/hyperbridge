              with:
                  node-version: 22
                  cache-dependency-path: "evm/pnpm-lock.yaml"
                  cache: "pnpm"

            - name: Install npm dependencies
              working-directory: evm
              run: |
                  pnpm install

            - uses: webfactory/ssh-agent@v0.7.0
              with:
                  ssh-private-key: ${{ secrets.SSH_KEY }}

            - uses: Swatinem/rust-cache@v2


            - name: Run BSC Tests
