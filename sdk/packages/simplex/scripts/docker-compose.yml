version: "3.8"

services:
    simplex:
        image: polytopelabs/hyperbridge-simplex:latest
        build:
            context: ../../..
            dockerfile: packages/simplex/scripts/Dockerfile
        container_name: hyperbridge-simplex
        restart: unless-stopped
        command: ["run", "-c", "/app/config/config.toml", "-p", "9090"]
        volumes:
            - ${CONFIG_PATH:-../config.toml}:/app/config/config.toml:ro
        environment:
            - NODE_ENV=production
        networks:
            - simplex-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: ["CMD", "node", "-e", "fetch('http://localhost:9090/health').then(r=>{if(!r.ok)throw 1})"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 5s

    prometheus:
        image: prom/prometheus:latest
        container_name: simplex-prometheus
        restart: unless-stopped
        volumes:
            - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=30d"
        networks:
            - simplex-network
        ports:
            - "${PROMETHEUS_PORT:-9091}:9090"

    grafana:
        image: grafana/grafana:latest
        container_name: simplex-grafana
        restart: unless-stopped
        volumes:
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
            - GF_USERS_ALLOW_SIGN_UP=false
        networks:
            - simplex-network
        ports:
            - "${GRAFANA_PORT:-3420}:3000"

volumes:
    prometheus-data:
    grafana-data:

networks:
    simplex-network:
        driver: bridge
