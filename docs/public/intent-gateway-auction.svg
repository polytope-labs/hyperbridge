<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" fill="none">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <rect width="860" height="440" rx="8" fill="#111"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#ccc" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace" font-size="15" font-weight="600">Order Auction Flow</text>

  <!-- Source Chain (left) -->
  <rect x="20" y="70" width="240" height="185" rx="4" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="140" y="90" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Source Chain</text>

  <rect x="45" y="108" width="190" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="140" y="127" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">IntentGateway</text>
  <text x="140" y="148" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">escrow: 100 USDT</text>

  <text x="140" y="195" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">OrderPlaced event</text>
  <text x="140" y="225" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">escrow released on settle</text>

  <!-- Hyperbridge (middle) -->
  <rect x="310" y="70" width="240" height="185" rx="4" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="430" y="90" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Hyperbridge</text>

  <rect x="335" y="108" width="190" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="430" y="127" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Auction</text>
  <text x="430" y="148" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">broadcast to solvers</text>

  <rect x="335" y="172" width="90" height="32" rx="3" fill="none" stroke="#444" stroke-width="1"/>
  <text x="380" y="186" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">Solver A</text>
  <text x="380" y="198" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="7">98 USDT</text>

  <rect x="435" y="172" width="90" height="32" rx="3" fill="none" stroke="#777" stroke-width="1"/>
  <text x="480" y="186" text-anchor="middle" fill="#999" font-family="ui-monospace, monospace" font-size="8">Solver B *</text>
  <text x="480" y="198" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="7">99 USDT</text>

  <rect x="335" y="210" width="90" height="32" rx="3" fill="none" stroke="#444" stroke-width="1"/>
  <text x="380" y="224" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">Solver C</text>
  <text x="380" y="236" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="7">97 USDT</text>

  <rect x="435" y="210" width="90" height="32" rx="3" fill="none" stroke="#444" stroke-width="1"/>
  <text x="480" y="224" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">Solver D</text>
  <text x="480" y="236" text-anchor="middle" fill="#444" font-family="ui-monospace, monospace" font-size="7">95 USDT</text>

  <!-- Destination Chain (right) -->
  <rect x="600" y="70" width="240" height="185" rx="4" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="720" y="90" text-anchor="middle" fill="#777" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Destination Chain</text>

  <rect x="625" y="108" width="190" height="55" rx="3" fill="none" stroke="#555" stroke-width="1"/>
  <text x="720" y="127" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Execute UserOp</text>
  <text x="720" y="148" text-anchor="middle" fill="#666" font-family="ui-monospace, monospace" font-size="9">solver fills order</text>

  <text x="720" y="195" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">beneficiary receives</text>
  <text x="720" y="210" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">output tokens</text>
  <text x="720" y="235" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">settlement message dispatched</text>

  <!-- Arrow: Destination -> Hyperbridge (settlement) -->
  <path d="M 600 245 L 550 245" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="575" y="238" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">4. settlement</text>

  <!-- Arrow: Hyperbridge -> Source (release escrow) -->
  <path d="M 310 245 L 260 245" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="285" y="238" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">release escrow</text>

  <!-- User (bottom) -->
  <rect x="170" y="330" width="520" height="50" rx="4" fill="none" stroke="#666" stroke-width="1"/>
  <text x="430" y="360" text-anchor="middle" fill="#ddd" font-family="ui-monospace, monospace" font-size="13" font-weight="600">User</text>

  <!-- Arrow: User -> Source Chain (placeOrder) -->
  <path d="M 270 330 L 140 255" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <text x="175" y="300" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">1. place order</text>

  <!-- Arrow: Hyperbridge -> User (bids) -->
  <path d="M 430 255 L 430 330" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)" stroke-dasharray="4,3"/>
  <text x="448" y="305" text-anchor="start" fill="#555" font-family="ui-monospace, monospace" font-size="8">2. collect bids</text>

  <!-- Arrow: User -> Destination Chain (execute) -->
  <path d="M 590 330 L 720 255" stroke="#555" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <text x="685" y="300" text-anchor="middle" fill="#555" font-family="ui-monospace, monospace" font-size="8">3. sign &amp; execute UserOp</text>

  <!-- Legend -->
  <line x1="30" y1="422" x2="60" y2="422" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="67" y="426" fill="#555" font-family="ui-monospace, monospace" font-size="9">async / cross-chain</text>
  <line x1="230" y1="422" x2="260" y2="422" stroke="#555" stroke-width="1"/>
  <text x="267" y="426" fill="#555" font-family="ui-monospace, monospace" font-size="9">sequential</text>
</svg>
